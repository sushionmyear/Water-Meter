name: Build and deploy installer site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Build firmware
        run: python -m platformio run -e esp32dev

      - name: Resolve boot_app0 path
        id: paths
        run: echo "boot_app0=$HOME/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin" >> "$GITHUB_OUTPUT"

      - name: Prepare site
        run: |
          mkdir -p _site
          cp docs/index.html _site/index.html
          cp docs/manifest.json _site/manifest.json
          cp docs/webui-preview.svg _site/webui-preview.svg
          cp .pio/build/esp32dev/bootloader.bin _site/bootloader.bin
          cp .pio/build/esp32dev/partitions.bin _site/partitions.bin
          cp "${{ steps.paths.outputs.boot_app0 }}" _site/boot_app0.bin
          cp .pio/build/esp32dev/firmware.bin _site/firmware.bin
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
