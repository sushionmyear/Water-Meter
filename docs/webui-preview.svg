<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Water Meter Console preview</title>
  <desc id="desc">Illustrated preview of the Water Meter Console web interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4f8"/>
      <stop offset="100%" stop-color="#dde9f2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbfd"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b5cab"/>
      <stop offset="100%" stop-color="#189a8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#163044" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>
  <circle cx="1130" cy="120" r="160" fill="#cde8ee" opacity="0.7"/>
  <circle cx="170" cy="730" r="150" fill="#d8e6f6" opacity="0.8"/>

  <rect x="110" y="54" width="1060" height="712" rx="28" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="110" y="54" width="1060" height="116" rx="28" fill="url(#hero)"/>
  <rect x="110" y="134" width="1060" height="36" fill="url(#hero)"/>

  <text x="162" y="112" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Water Meter Console</text>
  <text x="162" y="145" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#dff7f3">Web UI for setup, calibration, MQTT, and OTA firmware updates</text>

  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="160" y="204" width="182" height="94" rx="18" fill="#f3f8fc" stroke="#d7e1ea"/>
    <text x="184" y="235" font-size="14" fill="#617182">Platform</text>
    <text x="184" y="272" font-size="28" font-weight="700" fill="#12212f">ESP32</text>

    <rect x="360" y="204" width="182" height="94" rx="18" fill="#f3f8fc" stroke="#d7e1ea"/>
    <text x="384" y="235" font-size="14" fill="#617182">IP Address</text>
    <text x="384" y="272" font-size="24" font-weight="700" fill="#12212f">192.168.1.42</text>

    <rect x="560" y="204" width="182" height="94" rx="18" fill="#f3f8fc" stroke="#d7e1ea"/>
    <text x="584" y="235" font-size="14" fill="#617182">MQTT</text>
    <text x="584" y="272" font-size="28" font-weight="700" fill="#0c7b59">Connected</text>

    <rect x="760" y="204" width="182" height="94" rx="18" fill="#f3f8fc" stroke="#d7e1ea"/>
    <text x="784" y="235" font-size="14" fill="#617182">Sensor</text>
    <text x="784" y="272" font-size="28" font-weight="700" fill="#0c7b59">Detected</text>

    <rect x="960" y="204" width="160" height="94" rx="18" fill="#f3f8fc" stroke="#d7e1ea"/>
    <text x="984" y="235" font-size="14" fill="#617182">Flow</text>
    <text x="984" y="272" font-size="28" font-weight="700" fill="#12212f">0.82 gpm</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="160" y="345" font-size="24" font-weight="700" fill="#132433">Network</text>
    <rect x="160" y="362" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="184" y="390" font-size="15" font-weight="700" fill="#203243">WiFi SSID</text>
    <text x="184" y="416" font-size="15" fill="#6c7d8c">The wireless network this controller should join.</text>
    <text x="470" y="406" text-anchor="end" font-size="18" fill="#27445d">MyNetwork</text>

    <rect x="160" y="447" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="184" y="475" font-size="15" font-weight="700" fill="#203243">MQTT Host</text>
    <text x="184" y="501" font-size="15" fill="#6c7d8c">IP address or hostname of your MQTT broker.</text>
    <text x="470" y="491" text-anchor="end" font-size="18" fill="#27445d">mqtt.local</text>

    <text x="670" y="345" font-size="24" font-weight="700" fill="#132433">Meter Calibration</text>
    <rect x="670" y="362" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="694" y="390" font-size="15" font-weight="700" fill="#203243">Pulse Lockout (ms)</text>
    <text x="694" y="416" font-size="15" fill="#6c7d8c">Lower values allow higher max GPM, but too low can double-count noise.</text>
    <text x="1080" y="491" text-anchor="end" font-size="18" fill="#27445d">250</text>

    <rect x="670" y="447" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="694" y="475" font-size="15" font-weight="700" fill="#203243">Gallons Per Pulse</text>
    <text x="694" y="501" font-size="15" fill="#6c7d8c">How many gallons one meter pulse represents.</text>
    <text x="1080" y="491" text-anchor="end" font-size="18" fill="#27445d">0.02250</text>

    <text x="160" y="575" font-size="24" font-weight="700" fill="#132433">Publishing And Persistence</text>
    <rect x="160" y="592" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="184" y="620" font-size="15" font-weight="700" fill="#203243">Flash Save Interval (ms)</text>
    <text x="184" y="646" font-size="15" fill="#6c7d8c">Shorter saves lose less on power loss but wear flash faster.</text>
    <text x="570" y="636" text-anchor="end" font-size="18" fill="#27445d">60000</text>

    <text x="670" y="575" font-size="24" font-weight="700" fill="#132433">Firmware OTA</text>
    <rect x="670" y="592" width="450" height="72" rx="14" fill="#ffffff" stroke="#cfdbe5"/>
    <text x="694" y="620" font-size="15" font-weight="700" fill="#203243">Firmware Binary</text>
    <text x="694" y="646" font-size="15" fill="#6c7d8c">Upload the matching .bin and the device reboots automatically.</text>
    <rect x="960" y="607" width="138" height="42" rx="12" fill="#0e6cbf"/>
    <text x="1029" y="634" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Upload</text>
  </g>

  <rect x="160" y="700" width="260" height="42" rx="12" fill="#0e6cbf"/>
  <text x="290" y="727" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#ffffff">Save Settings And Reboot</text>
  <rect x="438" y="700" width="188" height="42" rx="12" fill="#eef4fa" stroke="#c8d6e4"/>
  <text x="532" y="727" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#1b3348">Reset Pulse Counter</text>
  <rect x="646" y="700" width="154" height="42" rx="12" fill="#f9e9e6" stroke="#e2b7ae"/>
  <text x="723" y="727" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#8f2f23">Reboot Device</text>
</svg>
